<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>案件管理系統</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#64748b',
                        success: '#22c55e',
                        warning: '#f97316',
                        danger: '#ef4444',
                        cyan: {
                            50: '#ecfeff', 100: '#cffafe', 200: '#a5f3fc', 300: '#67e8f9', 400: '#22d3ee',
                            500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 800: '#155e75', 900: '#164e63',
                        }
                    },
                    zIndex: {
                        'modal': 9999,
                        'bottom-nav': 50,
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* Fade In Animation */
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <!-- Firebase Modular SDK Import -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 將 Firebase 模組掛載到 global 以供 React 使用
        window.FirebaseModules = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDoc
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Constants ---
        const TAOYUAN_DISTRICTS = ['桃園區', '中壢區', '平鎮區', '八德區', '楊梅區', '蘆竹區', '大溪區', '龜山區', '大園區', '觀音區', '新屋區', '龍潭區', '復興區'];

        // --- Helper Functions ---
        // 自動計算期限 (預設 +7 天)
        const calculateDeadline = (dateStr, days = 7) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        };

        // --- Gemini API Integration (Optional/Placeholder) ---
        const apiKey = ""; // 如果您想在 Netlify 上使用 AI 功能，您需要申請 Google Gemini API 金鑰並填入此處

        const callGeminiAPI = async (prompt) => {
            if (!apiKey) {
                return "尚未設定 API 金鑰，AI 輔助功能暫時無法使用。";
            }
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "無法生成內容";
            } catch (error) {
                console.error("Gemini API Error:", error);
                return "AI 服務連線失敗。";
            }
        };

        // --- Icons (SVG Components) ---
        const Icons = {
            List: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>,
            Briefcase: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
            Mail: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>,
            ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>,
            Archive: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        };

        // --- New Component: Custom Modal ---
        const Modal = ({ isOpen, title, content, actions }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-modal flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all scale-100">
                        <div className="p-6">
                            <h3 className="text-xl font-bold text-gray-900 mb-3">{title}</h3>
                            <div className="text-gray-600 text-base mb-8 whitespace-pre-wrap leading-relaxed">{content}</div>
                            <div className="flex flex-col gap-3">
                                {actions}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Helper Components ---

        const StatusBadge = ({ status }) => {
            const config = {
                PENDING: { color: 'bg-red-100 text-red-800', label: '待處理' },
                REPLIED_STAGE_1: { color: 'bg-blue-100 text-blue-800', label: '一階回覆' },
                UNSATISFIED: { color: 'bg-orange-100 text-orange-800', label: '民眾不滿意' },
                REPLIED_STAGE_2: { color: 'bg-purple-100 text-purple-800', label: '二階回覆' },
                CLOSED: { color: 'bg-green-100 text-green-800', label: '已結案' },
            }[status] || { color: 'bg-gray-100', label: '未知' };
            
            return (
                <span className={`px-2 py-1 rounded-full text-xs font-bold border ${config.color} border-opacity-20`}>
                    {config.label}
                </span>
            );
        };

        const CategoryBadge = ({ category }) => {
            const config = {
                SIGN: { color: 'bg-cyan-100 text-cyan-800', label: '標誌標線' },
                SIGNAL: { color: 'bg-red-100 text-red-800', label: '號誌' },
                OTHER: { color: 'bg-gray-100 text-gray-800', label: '其他' },
                SURVEY: { color: 'bg-indigo-100 text-indigo-800', label: '會勘' },
                REPLY: { color: 'bg-teal-100 text-teal-800', label: '回復' },
            }[category] || { color: 'bg-gray-100', label: '未分類' };

            return (
                <span className={`px-2 py-1 rounded-full text-xs font-bold border ${config.color} border-opacity-20`}>
                    {config.label}
                </span>
            );
        };

        // --- Views ---

        // 1. Case List View
        const CaseList = ({ cases, onSelectCase, activeTab, onTabChange, config }) => {
            const [filter, setFilter] = useState('');
            
            const tabFilteredCases = cases.filter(c => {
                const currentTabConfig = config.tabs.find(t => t.id === activeTab);
                return currentTabConfig ? currentTabConfig.filter(c) : true;
            });

            const filteredCases = tabFilteredCases.filter(c => {
                const keyword = filter.toLowerCase();
                return (c.caseNumber && c.caseNumber.toLowerCase().includes(keyword)) ||
                       (c.location.address && c.location.address.toLowerCase().includes(keyword)) ||
                       (c.location.district && c.location.district.toLowerCase().includes(keyword)) ||
                       (c.petitioner.name && c.petitioner.name.toLowerCase().includes(keyword)) ||
                       (c.content && c.content.toLowerCase().includes(keyword));
            });

            return (
                <div className="bg-white rounded-lg shadow h-full flex flex-col">
                    <div className="flex border-b overflow-x-auto">
                        {config.tabs.map(tab => (
                            <button 
                                key={tab.id}
                                className={`flex-1 min-w-[100px] py-4 text-sm font-bold transition-colors whitespace-nowrap px-4 flex items-center justify-center gap-2 ${activeTab === tab.id ? `border-b-2 border-${tab.color}-500 text-${tab.color}-600 bg-${tab.color}-50` : 'text-gray-500 hover:bg-gray-50'}`}
                                onClick={() => onTabChange(tab.id)}
                            >
                                <tab.icon /> {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="p-4 border-b flex gap-2 bg-gray-50">
                        <div className="relative flex-1">
                            <input 
                                type="text" 
                                placeholder="輸入關鍵字搜尋 (包含行政區、地點、陳情內容等)..." 
                                className="w-full pl-9 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white transition-colors"
                                value={filter}
                                onChange={(e) => setFilter(e.target.value)}
                            />
                            <div className="absolute left-3 top-2.5 text-gray-400">
                                <Icons.Search />
                            </div>
                        </div>
                    </div>
                    
                    <div className="hidden md:block flex-1 overflow-y-auto">
                        <table className="w-full text-sm text-left text-gray-500">
                            <thead className="text-xs text-gray-700 uppercase bg-gray-50 sticky top-0 shadow-sm">
                                <tr>
                                    {config.showCaseNumber && <th className="px-6 py-3">案件編號</th>}
                                    <th className="px-6 py-3">狀態</th>
                                    {config.showCategory && <th className="px-6 py-3">類別</th>}
                                    <th className="px-6 py-3">行政區</th>
                                    <th className="px-6 py-3">地點</th>
                                    <th className="px-6 py-3">陳情人</th>
                                    <th className="px-6 py-3">陳情內容</th>
                                    <th className="px-6 py-3">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredCases.map((c) => (
                                    <tr key={c.id} className="bg-white border-b hover:bg-gray-50 transition-colors">
                                        {config.showCaseNumber && <td className="px-6 py-4 font-medium text-gray-900">{c.caseNumber}</td>}
                                        <td className="px-6 py-4"><StatusBadge status={c.status} /></td>
                                        {config.showCategory && <td className="px-6 py-4"><CategoryBadge category={c.category} /></td>}
                                        <td className="px-6 py-4">{c.location.district}</td>
                                        <td className="px-6 py-4 truncate max-w-[150px]">{c.location.address}</td>
                                        <td className="px-6 py-4">{c.petitioner.name}</td>
                                        <td className="px-6 py-4 truncate max-w-[200px]">{c.content}</td>
                                        <td className="px-6 py-4">
                                            <button 
                                                onClick={() => onSelectCase(c)}
                                                className="font-medium text-blue-600 hover:underline hover:text-blue-800 bg-blue-50 px-3 py-1 rounded transition-colors"
                                            >
                                                詳情
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                                {filteredCases.length === 0 && (
                                    <tr>
                                        <td colSpan="8" className="px-6 py-12 text-center text-gray-400 text-base">
                                            {config.tabs.find(t => t.id === activeTab)?.label} - 查無相關案件
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>

                    <div className="md:hidden flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 pb-16">
                        {filteredCases.map(c => (
                            <div key={c.id} className="bg-white p-4 rounded-lg shadow-sm border border-gray-100 active:scale-[0.99] transition-transform" onClick={() => onSelectCase(c)}>
                                <div className="flex justify-between items-start mb-3">
                                    <div className="font-bold text-gray-800 text-lg">
                                        {config.showCaseNumber ? c.caseNumber : `${c.location.district}案件`}
                                    </div>
                                    <StatusBadge status={c.status} />
                                </div>
                                <div className="flex flex-wrap gap-2 mb-3">
                                    {config.showCategory && <CategoryBadge category={c.category} />}
                                    <span className="px-2 py-1 rounded-full text-xs font-bold border bg-gray-100 text-gray-700">{c.location.district}</span>
                                </div>
                                <div className="text-sm text-gray-600 mb-2">
                                    <span className="font-bold mr-1">地點:</span> {c.location.address}
                                </div>
                                <div className="text-sm text-gray-600 mb-2">
                                    <span className="font-bold mr-1">陳情人:</span> {c.petitioner.name}
                                </div>
                                <div className="text-sm text-gray-500 line-clamp-2 bg-gray-50 p-2 rounded">
                                    {c.content}
                                </div>
                            </div>
                        ))}
                        {filteredCases.length === 0 && (
                            <div className="text-center py-10 text-gray-400">
                                暫無案件
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 2. Create Case Form
        const CaseForm = ({ onSubmit, onCancel, systemType }) => {
            const isCouncilor = systemType === 'COUNCILOR';
            
            const [formData, setFormData] = useState({
                caseNumber: isCouncilor ? `COUNCIL-${Date.now()}` : '',
                category: isCouncilor ? 'SURVEY' : 'OTHER',
                name: '', 
                phone: '', 
                email: '', 
                district: '桃園區',
                address: '', 
                content: '',
                extData: {
                    surveyDate: '',
                    surveyDocNo: '',
                    assignee: '',
                    recordDeadline: '',
                    recordActualDate: '',
                    recordDocNo: '',
                    surveyResolution: '',
                    dispatchDate: '',
                    completionDate: ''
                }
            });

            useEffect(() => {
                if (systemType === 'COUNCILOR') {
                    setFormData(prev => ({ ...prev, category: 'SURVEY' }));
                } else {
                    setFormData(prev => ({ ...prev, category: 'OTHER' }));
                }
            }, [systemType]);

            const handleExtDataChange = (field, value) => {
                setFormData(prev => ({
                    ...prev,
                    extData: { ...prev.extData, [field]: value }
                }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="h-full flex flex-col md:flex-row gap-4 pb-16 md:pb-0 justify-center">
                    <div className="w-full md:max-w-3xl bg-white p-6 md:p-8 rounded-lg shadow-lg overflow-y-auto">
                        <div className="flex items-center justify-between mb-6 border-b pb-4">
                            <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-800">
                                <div className="p-2 bg-blue-100 rounded-lg text-blue-600"><Icons.Plus /></div>
                                新增案件
                            </h2>
                            <span className="text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                                {isCouncilor ? '本局列管案件' : '市政信箱'}
                            </span>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="space-y-4">
                                <h3 className="text-lg font-bold text-gray-700 bg-gray-50 p-2 rounded">基本資料</h3>
                                
                                {!isCouncilor && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">案件編號</label>
                                        <input required type="text" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" 
                                            placeholder="請輸入案件編號 (例如: TY-20231027-001)"
                                            value={formData.caseNumber} onChange={e => setFormData({...formData, caseNumber: e.target.value})} />
                                    </div>
                                )}
                                
                                {isCouncilor && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">案件類別</label>
                                        <select 
                                            className="w-full border border-gray-300 rounded-md p-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                                            value={formData.category}
                                            onChange={e => setFormData({...formData, category: e.target.value})}
                                        >
                                            <option value="SURVEY">會勘</option>
                                            <option value="REPLY">回復</option>
                                        </select>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="md:col-span-1">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">陳情人</label>
                                        <input required type="text" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                                            value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="陳情人姓名" />
                                    </div>
                                    {!isCouncilor && (
                                        <>
                                            <div className="md:col-span-1">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">聯絡電話</label>
                                                <input required type="text" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500" 
                                                    value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                            </div>
                                            <div className="md:col-span-1">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">郵件信箱</label>
                                                <input type="email" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500" 
                                                    value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                            </div>
                                        </>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="md:col-span-1">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">行政區</label>
                                        <select 
                                            className="w-full border border-gray-300 rounded-md p-2.5 bg-white focus:ring-2 focus:ring-blue-500"
                                            value={formData.district}
                                            onChange={e => setFormData({...formData, district: e.target.value})}
                                        >
                                            {TAOYUAN_DISTRICTS.map(d => <option key={d} value={d}>{d}</option>)}
                                        </select>
                                    </div>
                                    <div className="md:col-span-3">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">案件地點 (詳細地址/路口)</label>
                                        <input required type="text" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500" 
                                            placeholder="例如：中正路與力行路口"
                                            value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">陳情內容</label>
                                    <textarea required rows="4" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500"
                                        value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})}></textarea>
                                </div>
                            </div>

                            {isCouncilor && (
                                <div className="space-y-4 pt-4 border-t">
                                    <h3 className="text-lg font-bold text-gray-700 bg-purple-50 p-2 rounded">本局列管 - 會勘基本資訊</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">承辦人</label>
                                            <input type="text" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-purple-500" 
                                                value={formData.extData.assignee} onChange={e => handleExtDataChange('assignee', e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">會勘日期</label>
                                            <input type="date" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-purple-500" 
                                                value={formData.extData.surveyDate} 
                                                onChange={e => {
                                                    const val = e.target.value;
                                                    handleExtDataChange('surveyDate', val);
                                                    handleExtDataChange('recordDeadline', calculateDeadline(val));
                                                }} 
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">會勘通知文號</label>
                                            <input type="text" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-purple-500" 
                                                value={formData.extData.surveyDocNo} onChange={e => handleExtDataChange('surveyDocNo', e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">會勘紀錄取號期限</label>
                                            <input type="date" className="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-purple-500" 
                                                value={formData.extData.recordDeadline} onChange={e => handleExtDataChange('recordDeadline', e.target.value)} />
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="pt-6 flex gap-4 border-t mt-6">
                                <button type="submit" className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-bold text-lg shadow-md transition-transform active:scale-95">確認立案</button>
                                <button type="button" onClick={onCancel} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg hover:bg-gray-300 font-bold text-lg transition-transform active:scale-95">取消</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // 3. Case Detail View (Timeline & Info)
        const CaseDetail = ({ caseData, onBack, onUpdateStatus, onDelete, systemType }) => {
            const isCouncilor = systemType === 'COUNCILOR';
            const [replyContent, setReplyContent] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [aiSummary, setAiSummary] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', content: '', actions: null });
            
            const [editExtData, setEditExtData] = useState({
                surveyDate: '',
                recordDeadline: '',
                recordActualDate: '',
                recordDocNo: '',
                surveyResolution: '',
                dispatchDate: '',
                completionDate: ''
            });

            useEffect(() => {
                if (caseData && caseData.extData) {
                    setEditExtData({
                        surveyDate: caseData.extData.surveyDate || '',
                        recordDeadline: caseData.extData.recordDeadline || '',
                        recordActualDate: caseData.extData.recordActualDate || '',
                        recordDocNo: caseData.extData.recordDocNo || '',
                        surveyResolution: caseData.extData.surveyResolution || '',
                        dispatchDate: caseData.extData.dispatchDate || '',
                        completionDate: caseData.extData.completionDate || ''
                    });
                }
            }, [caseData]);

            const closeModal = () => setModalConfig(prev => ({ ...prev, isOpen: false }));

            const handleReply = (stage) => {
                if(!replyContent && stage !== 'CLOSED') {
                    setErrorMsg('⚠️ 請先輸入回覆內容才能送出');
                    return;
                }
                setErrorMsg('');
                onUpdateStatus(caseData.id, stage, replyContent || '案件結案 (無回覆內容)');
                setReplyContent('');
            };

            const handleExtDataReply = (stage) => {
                const actionText = stage === 'CLOSED' ? '更新案件資訊並結案' : '更新案件處理資訊';
                onUpdateStatus(caseData.id, stage, actionText, editExtData);
            };

            const handleDeleteClick = () => {
                setModalConfig({
                    isOpen: true,
                    title: '⚠️ 危險操作確認',
                    content: `您確定要刪除此案件嗎？\n此動作無法復原，請謹慎操作。`,
                    actions: (
                        <div className="flex gap-2 mt-4">
                            <button onClick={closeModal} className="flex-1 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium">取消</button>
                            <button onClick={() => { onDelete(caseData.id); closeModal(); }} className="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium">確認刪除</button>
                        </div>
                    )
                });
            };

            const handleAiSummary = async () => {
                if (aiSummary) return; 
                setIsGenerating(true);
                const prompt = `請用繁體中文為以下案件生成 100 字以內的「案件摘要」與「處理建議」：\n陳情內容：${caseData.content}\n歷程：${caseData.history.map(h => h.content).join('; ')}`;
                const result = await callGeminiAPI(prompt);
                if (result) setAiSummary(result);
                setIsGenerating(false);
            };

            return (
                <div className="h-full flex flex-col md:flex-row gap-6 relative pb-16 md:pb-0">
                    <Modal {...modalConfig} />

                        {aiSummary && (

                                <p className="leading-relaxed text-justify">{aiSummary}</p>
                            </div>

                                    </div>
                                    {!isCouncilor && (
                                        <>
                                            <div className="flex">
                                                <span className="text-gray-500 w-24 shrink-0 font-medium">聯絡電話</span>

                                            </div>
                                            <div className="flex">
                                                <span className="text-gray-500 w-24 shrink-0 font-medium">郵件信箱</span>

                                            </div>
                                        </>

                                    <div className="mt-2">
                                        <span className="text-gray-500 font-medium block mb-1">陳情內容</span>
                                        <p className="text-gray-800 leading-relaxed bg-white p-3 rounded border border-gray-200">{caseData.content}</p>
                                    </div>

                                <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">

                                            <span className="text-blue-600/70 text-xs font-bold">承辦人</span>
                                            <span className="font-bold text-gray-900">{caseData.extData.assignee || '-'}</span>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-blue-600/70 text-xs font-bold">會勘日期</span>

                                        </div>
                                        <div className="flex flex-col md:col-span-2">
                                            <span className="text-blue-600/70 text-xs font-bold">會勘通知文號</span>
                                            <span className="font-bold text-gray-900">{caseData.extData.surveyDocNo || '-'}</span>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-blue-600/70 text-xs font-bold">紀錄取號期限</span>
                                            <span className="font-bold text-gray-900">{caseData.extData.recordDeadline || '-'}</span>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-blue-600/70 text-xs font-bold">紀錄實際取號日期</span>

                                        <div className="flex flex-col md:col-span-2">

                                        <div className="flex flex-col md:col-span-2 mt-1">
                                            <span className="text-blue-600/70 text-xs font-bold mb-1">會勘決議事項</span>

                                            </div>
                                        </div>
                                        <div className="flex flex-col mt-1">
                                            <span className="text-blue-600/70 text-xs font-bold">派工日期</span>
                                            <span className="font-bold text-gray-900">{caseData.extData.dispatchDate || '-'}</span>
                                        </div>
                                        <div className="flex flex-col mt-1">
                                            <span className="text-blue-600/70 text-xs font-bold">完工日期</span>
                                            <span className="font-bold text-gray-900">{caseData.extData.completionDate || '-'}</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                        
                        <div className="mt-auto pt-8">
                             <button onClick={handleDeleteClick} className="w-full text-red-500 hover:text-red-700 hover:bg-red-50 px-4 py-3 rounded-lg flex items-center justify-center gap-2 text-sm font-bold transition-colors border border-transparent hover:border-red-200">
                                <Icons.Trash /> 刪除案件
                            </button>
                        </div>
                    </div>

                    <div className="w-full md:w-1/2 bg-white p-6 rounded-lg shadow-lg overflow-y-auto pb-16 md:pb-6 flex flex-col">
                        <h3 className="text-lg font-bold mb-6 border-b pb-2 flex items-center gap-2 text-gray-800">
                            <Icons.List /> 處理進度與歷程
                        </h3>
                        
                        <div className="relative border-l-2 border-gray-200 ml-4 space-y-6 mb-8 flex-1">
                            {caseData.history.map((item, idx) => (
                                <div key={idx} className="relative pl-6">
                                    <div className={`absolute -left-[9px] top-0 w-4 h-4 rounded-full border-2 border-white shadow-sm
                                        ${item.type === 'ALERT' ? 'bg-red-500' : (item.type === 'STAFF' ? 'bg-blue-500' : 'bg-gray-400')}`}>
                                    </div>
                                    <div className="flex flex-wrap justify-between items-baseline mb-1">
                                        <span className="font-bold text-gray-800 mr-2">{item.author}</span>
                                        <span className="text-xs text-gray-500">{item.date}</span>
                                    </div>
                                    <div className={`p-3 rounded-lg text-sm border shadow-sm ${item.type === 'ALERT' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-white border-gray-200 text-gray-700'}`}>
                                        {item.content}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {caseData.status !== 'CLOSED' && (
                            <div className="pt-6 border-t mt-auto bg-gray-50 -mx-6 -mb-6 px-6 pb-6 pt-4">
                                {isCouncilor ? (
                                    <>
                                        <h4 className="font-bold text-purple-800 mb-3">填寫處理結果</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                                            <div>
                                                <label className="block text-gray-700 mb-1 font-medium">會勘日期 (可變更)</label>
                                                <input type="date" className="w-full border border-gray-300 rounded p-2.5 focus:ring-2 focus:ring-purple-500 outline-none transition-colors" 
                                                    value={editExtData.surveyDate} 
                                                    onChange={e => {
                                                        const val = e.target.value;
                                                        setEditExtData({
                                                            ...editExtData, 
                                                            surveyDate: val,
                                                            recordDeadline: calculateDeadline(val)
                                                        });
                                                    }} 
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-gray-700 mb-1 font-medium">紀錄取號期限</label>
                                                <input type="date" className="w-full border border-gray-300 rounded p-2.5 focus:ring-2 focus:ring-purple-500 outline-none transition-colors" 
                                                    value={editExtData.recordDeadline} 
                                                    onChange={e => setEditExtData({...editExtData, recordDeadline: e.target.value})} 
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-gray-700 mb-1 font-medium">紀錄實際取號日期</label>
                                                <input type="date" className="w-full border border-gray-300 rounded p-2.5 focus:ring-2 focus:ring-purple-500 outline-none transition-colors" value={editExtData.recordActualDate} onChange={e => setEditExtData({...editExtData, recordActualDate: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-gray-700 mb-1 font-medium">會勘紀錄文號</label>
                                                <input type="text" className="w-full border border-gray-300 rounded p-2.5 focus:ring-2 focus:ring-purple-500 outline-none transition-colors" value={editExtData.recordDocNo} onChange={e => setEditExtData({...editExtData, recordDocNo: e.target.value})} />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-gray-700 mb-1 font-medium">會勘決議事項</label>
                                                <textarea rows="2" className="w-full border border-gray-300 rounded p-2.5 focus:ring-2 focus:ring-purple-500 outline-none transition-colors" value={editExtData.surveyResolution} onChange={e => setEditExtData({...editExtData, surveyResolution: e.target.value})}></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-gray-700 mb-1 font-medium">派工日期</label>
                                                <input type="date" className="w-full border border-gray-300 rounded p-2.5 focus:ring-2 focus:ring-purple-500 outline-none transition-colors" value={editExtData.dispatchDate} onChange={e => setEditExtData({...editExtData, dispatchDate: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-gray-700 mb-1 font-medium">完工日期</label>
                                                <input type="date" className="w-full border border-gray-300 rounded p-2.5 focus:ring-2 focus:ring-purple-500 outline-none transition-colors" value={editExtData.completionDate} onChange={e => setEditExtData({...editExtData, completionDate: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="mt-5 flex gap-3 flex-wrap">
                                            <button onClick={() => handleExtDataReply('PENDING')} className="flex-1 px-4 py-2.5 bg-purple-600 text-white rounded-lg hover:bg-purple-700 text-sm font-bold shadow-md transition-transform active:scale-95">
                                                儲存資料
                                            </button>
                                            <button onClick={() => handleExtDataReply('CLOSED')} className="flex-1 px-4 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-bold shadow-md transition-transform active:scale-95 flex items-center justify-center gap-1">
                                                <Icons.Check /> 儲存並結案
                                            </button>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="flex justify-between items-center mb-3">
                                            <h4 className="font-bold text-gray-800">新增辦理進度</h4>
                                        </div>
                                        <div className="relative">
                                            <textarea 
                                                className={`w-full border rounded-lg p-3 text-sm focus:ring-2 focus:outline-none transition-colors shadow-sm ${errorMsg ? 'border-red-500 focus:ring-red-200' : 'border-gray-300 focus:ring-blue-500'}`}
                                                rows="4"
                                                placeholder="請輸入辦理進度或回覆內容..."
                                                value={replyContent}
                                                onChange={(e) => {
                                                    setReplyContent(e.target.value);
                                                    if (e.target.value) setErrorMsg('');
                                                }}
                                            ></textarea>
                                            {errorMsg && <div className="text-red-500 text-xs mt-1">{errorMsg}</div>}
                                        </div>
                                        <div className="mt-4 flex gap-3 flex-wrap">
                                            <button onClick={() => handleReply('PENDING')} className="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-bold shadow-md transition-transform active:scale-95">
                                                送出辦理紀錄
                                            </button>
                                            <button onClick={() => handleReply('CLOSED')} className="flex-1 px-4 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-bold shadow-md transition-transform active:scale-95 flex items-center justify-center gap-1">
                                                <Icons.Check /> 直接結案
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- Landing Page Component ---
        const LandingPage = ({ onSelect }) => {
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 overflow-y-auto">
                    <div className="max-w-4xl w-full">
                        <div className="text-center mb-8 md:mb-12 animate-fade-in">
                            <h1 className="text-3xl md:text-5xl font-black text-slate-800 mb-4 tracking-tight">案件管理系統</h1>
                            <p className="text-slate-500 text-base md:text-lg font-medium">請選擇您要進入的業務系統</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                            <button onClick={() => onSelect('MUNICIPAL')} className="bg-white p-8 rounded-2xl shadow-lg hover:shadow-2xl transition-all transform hover:-translate-y-1 group border border-slate-100 flex flex-col items-center text-center animate-fade-in">
                                <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mb-6 group-hover:scale-110 transition-transform">
                                    <Icons.Mail />
                                </div>
                                <h2 className="text-2xl font-bold text-slate-800 mb-2">市政信箱</h2>
                                <p className="text-slate-500 text-sm">一般民眾陳情案件管理、回覆與追蹤</p>
                            </button>

                            <button onClick={() => onSelect('COUNCILOR')} className="bg-white p-8 rounded-2xl shadow-lg hover:shadow-2xl transition-all transform hover:-translate-y-1 group border border-slate-100 flex flex-col items-center text-center animate-fade-in" style={{ animationDelay: '0.1s' }}>
                                <div className="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 mb-6 group-hover:scale-110 transition-transform">
                                    <Icons.Briefcase />
                                </div>
                                <h2 className="text-2xl font-bold text-slate-800 mb-2">本局列管案件</h2>
                                <p className="text-slate-500 text-sm">議會交辦、內部專案列管專區</p>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Case Management System Container ---
        const CaseManagementSystem = ({ systemType, onBackToHome }) => {
            const [view, setView] = useState('LIST'); 
            const [cases, setCases] = useState([]);
            const [selectedCase, setSelectedCase] = useState(null);
            
            // Notifications State
            const [showNotifications, setShowNotifications] = useState(false);

            // Fetch from Firebase: 使用獨立的設定，請填寫您的 Firebase 設定
            useEffect(() => {
                let unsubscribe = null;

                const initStandaloneFirebase = async () => {
                    const { initializeApp, getFirestore, collection, onSnapshot, doc, setDoc, getDoc } = window.FirebaseModules;
                    
                    // 【修改這裡】請填入您自己的 Firebase 設定！
                    // 若沒有填入，系統會嘗試使用 localStorage 作為本地備用方案
                    const myFirebaseConfig = {
                        apiKey: "AIzaSyDIF96erTBV_p_2AxPH1_szXQ-L57wyk3Y",
                        authDomain: "case-data-b9894.firebaseapp.com",
                        projectId: "case-data-b9894",
                        storageBucket: "ase-data-b9894.firebasestorage.app",
                        messagingSenderId: "699196825308",
                        appId: "1:699196825308:web:28efc588e5424a394c5e19"
                    };

                    try {
                        // 如果 apiKey 還是預設值，代表使用者還沒設定，退回使用 LocalStorage 模式
                        if (myFirebaseConfig.apiKey === "YOUR_API_KEY") {
                            console.warn("尚未設定 Firebase Config，使用 LocalStorage 模式儲存。");
                            const localData = localStorage.getItem('cases_backup');
                            if (localData) {
                                setCases(JSON.parse(localData));
                            } else {
                                setCases(initialCases);
                                localStorage.setItem('cases_backup', JSON.stringify(initialCases));
                            }
                            return;
                        }

                        if (!window.fbStandaloneApp) {
                            window.fbStandaloneApp = initializeApp(myFirebaseConfig, "StandaloneApp");
                            window.fbStandaloneDb = getFirestore(window.fbStandaloneApp);
                        }

                        const db = window.fbStandaloneDb;
                        // 改用自定義的集合路徑 (避開 AI 平台的權限限制)
                        const casesRef = collection(db, 'my_cases');
                        const metaRef = doc(db, 'my_meta', 'seed_status');

                        const metaSnap = await getDoc(metaRef);
                        if (!metaSnap.exists()) {
                            await setDoc(metaRef, { seeded: true, timestamp: new Date().toISOString() });
                            for (const c of initialCases) {
                                const cRef = doc(db, 'my_cases', c.id);
                                await setDoc(cRef, c);
                            }
                        }

                        unsubscribe = onSnapshot(casesRef, (snapshot) => {
                            const loadedCases = [];
                            snapshot.forEach(d => {
                                loadedCases.push({ id: d.id, ...d.data() });
                            });
                            loadedCases.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                            setCases(loadedCases);
                        }, (error) => {
                            console.error("Firestore error:", error);
                        });

                    } catch(e) {
                        console.error("Firebase 初始化失敗:", e);
                    }
                };

                // 等待模組載入後執行
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseModules) {
                        clearInterval(checkFirebase);
                        initStandaloneFirebase();
                    }
                }, 50);

                return () => {
                    clearInterval(checkFirebase);
                    if (unsubscribe) unsubscribe();
                };
            }, []);

            // 備用方案：當案件變動時，同步存入 LocalStorage
            useEffect(() => {
                if (cases.length > 0) {
                    localStorage.setItem('cases_backup', JSON.stringify(cases));
                }
            }, [cases]);

            const config = useMemo(() => {
                const baseTabs = [
                    { id: 'PROCESSING', label: '辦理中', color: 'blue', icon: Icons.List, filter: c => c.status !== 'CLOSED' },
                    { id: 'CLOSED', label: '已結案', color: 'green', icon: Icons.Archive, filter: c => c.status === 'CLOSED' }
                ];
                
                if (systemType === 'MUNICIPAL') {
                    return {
                        title: '市政信箱',
                        theme: 'blue',
                        showCategory: false,
                        showCaseNumber: true,
                        tabs: baseTabs
                    };
                } else {
                    return {
                        title: '本局列管案件',
                        theme: 'purple',
                        showCategory: true,
                        showCaseNumber: false,
                        tabs: baseTabs
                    };
                }
            }, [systemType]);

            const [activeListTab, setActiveListTab] = useState(config.tabs[0].id);

            const overdueCases = useMemo(() => {
                if (systemType !== 'COUNCILOR') return [];
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                return cases.filter(c => {
                    if (c.status === 'CLOSED') return false; 
                    if (!c.extData || !c.extData.recordDeadline) return false; 
                    if (c.extData.recordActualDate) return false; 
                    
                    const deadline = new Date(c.extData.recordDeadline);
                    return today > deadline; 
                });
            }, [cases, systemType]);

            const handleCreateCase = async (newCase) => {
                const caseId = Date.now().toString();
                const caseRecord = {
                    id: caseId,
                    caseNumber: newCase.caseNumber,
                    category: newCase.category, 
                    petitioner: { name: newCase.name, phone: newCase.phone, email: newCase.email },
                    location: { district: newCase.district, address: newCase.address },
                    content: newCase.content,
                    status: 'PENDING',
                    createdAt: new Date().toLocaleString(),
                    history: [{ date: new Date().toLocaleString(), author: `系統`, content: '案件建立', type: 'USER' }],
                    extData: newCase.extData
                };
                
                if (window.fbStandaloneDb) {
                    const { doc, setDoc } = window.FirebaseModules;
                    const caseRef = doc(window.fbStandaloneDb, 'my_cases', caseId);
                    await setDoc(caseRef, caseRecord);
                } else {
                    setCases([caseRecord, ...cases]);
                }

                setView('LIST');
                setActiveListTab('PROCESSING'); 
            };

            const handleUpdateStatus = async (id, newStatus, replyText, newExtData) => {
                const caseToUpdate = cases.find(c => c.id === id);
                if (!caseToUpdate) return;

                let updatedHistory = caseToUpdate.history;
                if (replyText) {
                    const newHistory = {
                        date: new Date().toLocaleString(),
                        author: '承辦人員',
                        content: replyText,
                        type: 'STAFF'
                    };
                    updatedHistory = [...caseToUpdate.history, newHistory];
                }

                const updatedCase = {
                    ...caseToUpdate,
                    status: newStatus,
                    history: updatedHistory,
                    extData: newExtData ? { ...caseToUpdate.extData, ...newExtData } : caseToUpdate.extData
                };

                if (window.fbStandaloneDb) {
                    const { doc, setDoc } = window.FirebaseModules;
                    const caseRef = doc(window.fbStandaloneDb, 'my_cases', id);
                    await setDoc(caseRef, updatedCase);
                } else {
                    setCases(prevCases => prevCases.map(c => c.id === id ? updatedCase : c));
                }
                
                setSelectedCase(updatedCase);
            };

            const handleDeleteCase = async (id) => {
                if (window.fbStandaloneDb) {
                    const { doc, deleteDoc } = window.FirebaseModules;
                    const caseRef = doc(window.fbStandaloneDb, 'my_cases', id);
                    await deleteDoc(caseRef);
                } else {
                    setCases(prevCases => prevCases.filter(c => c.id !== id));
                }
                setSelectedCase(null);
                setView('LIST');
            };

            const handleSelectCase = (c) => {
                setSelectedCase(c);
                setView('DETAIL');
            };

            return (
                <div className="h-[100dvh] w-screen overflow-hidden flex flex-col md:flex-row bg-slate-100">
                    <aside className="hidden md:flex w-64 bg-slate-800 text-white flex-col shrink-0 shadow-xl z-20">
                        <div className="p-6 border-b border-slate-700">
                            <button onClick={onBackToHome} className="flex items-center gap-2 text-slate-400 hover:text-white text-xs mb-6 transition-colors group w-fit">
                                <div className="p-1.5 rounded bg-slate-700 group-hover:bg-slate-600 transition-colors">
                                    <Icons.ArrowLeft />
                                </div>
                                <span className="font-bold tracking-wider">返回系統選擇</span>
                            </button>
                            <h1 className="text-2xl font-black tracking-wider text-white">{config.title}</h1>
                            <div className={`text-xs mt-2 text-${config.theme}-400 font-bold bg-slate-900 w-fit px-2 py-1 rounded`}>案件管理子系統</div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <button onClick={() => setView('LIST')} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-lg transition-colors font-bold text-sm ${view === 'LIST' ? `bg-${config.theme}-600 text-white shadow-md` : 'text-slate-300 hover:bg-slate-700 hover:text-white'}`}>
                                <Icons.List /> 案件管理列表
                            </button>
                        </nav>
                        <div className="p-6 border-t border-slate-700 bg-slate-900/50">
                             <button onClick={() => setView('CREATE')} className={`w-full flex items-center justify-center gap-2 bg-${config.theme}-500 hover:bg-${config.theme}-400 text-white py-3.5 rounded-lg font-bold shadow-lg transition-transform active:scale-95`}>
                                <Icons.Plus /> 新增案件
                            </button>
                        </div>
                    </aside>

                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center p-2 z-bottom-nav h-16 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={onBackToHome} className="flex flex-col items-center p-2 text-gray-400 w-16">
                            <Icons.Home />
                            <span className="text-[10px] mt-1 font-bold">首頁</span>
                        </button>
                        <button onClick={() => setView('CREATE')} className={`flex flex-col items-center p-2 -mt-8 relative z-10`}>
                            <div className={`w-14 h-14 rounded-full bg-${config.theme}-500 text-white flex items-center justify-center shadow-xl border-4 border-white active:scale-95 transition-transform`}>
                                <Icons.Plus />
                            </div>
                            <span className="text-[10px] mt-1 font-bold text-gray-600">新增</span>
                        </button>
                        <button onClick={() => setView('LIST')} className={`flex flex-col items-center p-2 w-16 ${view === 'LIST' ? `text-${config.theme}-600` : 'text-gray-400'}`}>
                            <Icons.List />
                            <span className="text-[10px] mt-1 font-bold">列表</span>
                        </button>
                    </div>

                    <main className="flex-1 flex flex-col min-w-0 mb-16 md:mb-0 h-full overflow-hidden relative">
                        <header className="bg-white shadow-sm px-5 md:px-8 py-4 flex justify-between items-center z-[60] shrink-0 border-b border-gray-200 relative">
                            <div className="flex items-center gap-3">
                                <h2 className="text-xl md:text-2xl font-black text-gray-800 tracking-tight">
                                    {view === 'LIST' && '案件管理列表'}
                                    {view === 'CREATE' && '新增案件資料'}
                                    {view === 'DETAIL' && '案件處置詳情'}
                                </h2>
                            </div>
                            <div className="flex items-center gap-4">
                                {systemType === 'COUNCILOR' && (
                                    <div className="relative">
                                        <button 
                                            onClick={() => setShowNotifications(!showNotifications)}
                                            className={`relative p-2 rounded-full transition-colors ${showNotifications ? 'bg-purple-100 text-purple-700' : 'text-gray-500 hover:text-purple-600 hover:bg-purple-50'}`}
                                        >
                                            <Icons.Bell />
                                            {overdueCases.length > 0 && (
                                                <span className="absolute top-0 right-0 w-4 h-4 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                                                    {overdueCases.length}
                                                </span>
                                            )}
                                        </button>

                                        {showNotifications && (
                                            <>
                                                <div className="fixed inset-0 z-40" onClick={() => setShowNotifications(false)}></div>
                                                <div className="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-gray-100 overflow-hidden z-50 animate-fade-in origin-top-right">
                                                    <div className="bg-red-50 px-4 py-3 border-b border-red-100 flex justify-between items-center">
                                                        <h3 className="font-bold text-red-800 text-sm flex items-center gap-2">
                                                            <Icons.Alert /> 逾期未取號案件 ({overdueCases.length})
                                                        </h3>
                                                    </div>
                                                    <div className="max-h-80 overflow-y-auto">
                                                        {overdueCases.length === 0 ? (
                                                            <div className="p-6 text-center text-sm text-gray-500 font-medium">目前無逾期案件 🎉</div>
                                                        ) : (
                                                            overdueCases.map(c => (
                                                                <div 
                                                                    key={c.id} 
                                                                    onClick={() => {
                                                                        handleSelectCase(c);
                                                                        setShowNotifications(false);
                                                                    }}
                                                                    className="p-4 border-b border-gray-50 hover:bg-red-50/50 cursor-pointer transition-colors group"
                                                                >
                                                                    <div className="font-bold text-gray-800 text-sm group-hover:text-red-700 transition-colors">
                                                                        {c.location.district} - {c.location.address}
                                                                    </div>
                                                                    <div className="text-xs text-gray-500 mt-2 flex justify-between items-center">
                                                                        <span className="bg-gray-100 px-2 py-1 rounded text-gray-600">期限: {c.extData.recordDeadline}</span>
                                                                        <span className="text-red-600 font-bold flex items-center gap-1"><Icons.Alert /> 已逾期</span>
                                                                    </div>
                                                                </div>
                                                            ))
                                                        )}
                                                    </div>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                )}

                                <div className="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-200">
                                    <div className={`w-6 h-6 rounded-full bg-${config.theme}-100 flex items-center justify-center text-${config.theme}-600`}>
                                        <Icons.User />
                                    </div>
                                    <span className="text-xs font-bold text-gray-600 hidden sm:inline">管理員 ({config.title})</span>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 p-4 md:p-8 overflow-hidden flex flex-col">
                            {view === 'LIST' && (
                                <CaseList 
                                    cases={cases} 
                                    onSelectCase={handleSelectCase}
                                    activeTab={activeListTab}
                                    onTabChange={setActiveListTab}
                                    config={config}
                                />
                            )}

                            {view === 'CREATE' && (
                                <CaseForm onSubmit={handleCreateCase} onCancel={() => setView('LIST')} systemType={systemType} />
                            )}

                            {view === 'DETAIL' && selectedCase && (
                                <CaseDetail 
                                    caseData={selectedCase} 
                                    onBack={() => setView('LIST')} 
                                    onUpdateStatus={handleUpdateStatus}
                                    onDelete={handleDeleteCase}
                                    systemType={systemType}
                                />
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const App = () => {
            const [currentSystem, setCurrentSystem] = useState(null);
            
            if (!currentSystem) return <LandingPage onSelect={setCurrentSystem} />;
            return <CaseManagementSystem key={currentSystem} systemType={currentSystem} onBackToHome={() => setCurrentSystem(null)} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
